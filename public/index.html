<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Short URL</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <p class="eyebrow">Short URL</p>
      <h1>Paste a link and make it short.</h1>
      <p class="subtext">A minimal frontend for your URL shortener.</p>

      <form class="shortener-form">
        <input
          id="urlInput"
          name="url"
          type="url"
          placeholder="https://example.com"
          required
        />
        <button id="submitButton" type="submit">Create Short URL</button>
      </form>

      <div class="result" id="result">
        <p>Your short link will appear here.</p>
      </div>
    </section>
  </main>

  <script src="/script.js"></script>
</body>
</html>
